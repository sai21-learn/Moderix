name: moderix
version: 1.0.0
description: "Autonomous content moderation agent that classifies, flags, and routes social media posts across toxicity, spam, and NSFW categories."
author: "sai21-learn"
license: "MIT"
tags: ["safety", "moderation", "trust-and-safety", "rl"]

observation:
  type: object
  required: [content_id, content_text, source, timestamp]
  properties:
    content_id:
      type: string
    content_text:
      type: string
      description: "Full text of post to moderate"
    source:
      type: string
      enum: ["twitter", "reddit", "discord"]
    timestamp:
      type: string
      format: iso8601
    user_reputation:
      type: number
    thread_history:
      type: array
      items:
        type: string
    metadata:
      type: object

action:
  type: object
  required: [decision, reasoning]
  properties:
    decision:
      type: string
      enum: ["approve", "review", "reject", "escalate", "ban_user"]
    violation_type:
      type: string
      enum:
        [
          "none",
          "toxicity",
          "spam",
          "nsfw",
          "violence",
          "explicit",
          "adult_content",
        ]
    reasoning:
      type: string
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0

reward:
  type: number
  minimum: 0.0
  maximum: 1.0

tasks:
  - id: toxicity_detection
    name: Toxicity Detection
    description: Classify posts for toxic language severity
    difficulty: easy
    grader: graders.toxicity_detection:grade

  - id: spam_classification
    name: Spam Classification
    description: Binary spam vs legitimate
    difficulty: medium
    grader: graders.spam_classification:grade

  - id: nsfw_detection
    name: NSFW Detection
    description: Categorize inappropriate content
    difficulty: hard
    grader: graders.nsfw_detection:grade

  - id: reasoning_quality
    name: Reasoning Quality
    description: Evaluate agent justifications
    difficulty: medium
    grader: graders.reasoning_grader:grade
